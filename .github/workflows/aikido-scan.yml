# =============================================================================
# Aikido Security — Full Scan Pipeline (SAST + SCA + Secrets)
# Target: https://github.com/appsecco/dvja
# Fixed: correct action inputs per AikidoSec/github-actions-workflow@v1.0.12
# Valid inputs: secret-key, minimum-severity, fail-on-timeout,
#               fail-on-dependency-scan, fail-on-iac-scan, fail-on-sast-scan,
#               timeout-seconds, post-scan-status-comment,
#               post-sast-review-comments, github-token
# =============================================================================

name: Aikido Security Scan

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
#  schedule:
#    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: Aikido SAST + SCA + Secrets
  # ---------------------------------------------------------------------------
  aikido-scan:
    name: "Aikido — SAST / SCA / Secrets"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # REQUIRED: full history so Aikido can resolve base_commit_id
          fetch-depth: 0

      - name: Set up Java (DVJA is a Maven project)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'

      - name: Build project (improves SCA dependency resolution)
        run: mvn clean package -DskipTests -q 2>&1 || true

      # -----------------------------------------------------------------------
      # Aikido CI Scanner — corrected inputs only
      # Docs: https://docs.aikido.dev/ci-integrations/github-actions
      # -----------------------------------------------------------------------
      - name: Resolve Aikido commit context
        id: commits
        run: |
            CURRENT_SHA="${{ github.sha }}"
   
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              # PR: base is the target branch HEAD before this PR
              BASE_SHA="${{ github.event.pull_request.base.sha }}"
            else
              # Push / schedule / dispatch: use git parent
              BASE_SHA=$(git rev-parse HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)
            fi
   
            echo "AIKIDO_COMMIT_ID=${CURRENT_SHA}"    >> $GITHUB_ENV
            echo "AIKIDO_BASE_COMMIT_ID=${BASE_SHA}"  >> $GITHUB_ENV
            echo "AIKIDO_REPO=${{ github.repository }}" >> $GITHUB_ENV
            echo "AIKIDO_BRANCH=${{ github.ref_name }}" >> $GITHUB_ENV
   
            echo "commit_id=${CURRENT_SHA}" >> $GITHUB_OUTPUT
            echo "base_commit_id=${BASE_SHA}" >> $GITHUB_OUTPUT
   
      - name: Show resolved SHAs (debug)
        run: |
            echo "Current : $AIKIDO_COMMIT_ID"
            echo "Base    : $AIKIDO_BASE_COMMIT_ID"
            if [ "$AIKIDO_COMMIT_ID" = "$AIKIDO_BASE_COMMIT_ID" ]; then
              echo "ERROR: commit and base are identical — scan will fail"
              exit 1
            fi
   
      - name: Run Aikido Security Scan
        uses: AikidoSec/github-actions-workflow@v1.0.13
        with:
            secret-key: ${{ secrets.AIKIDO_TOKEN }}
            github-token: ${{ secrets.GITHUB_TOKEN }}
            minimum-severity: HIGH
            fail-on-sast-scan: true
            fail-on-dependency-scan: true
            fail-on-iac-scan: false
            timeout-seconds: 180
            fail-on-timeout: false
            post-scan-status-comment: on
            post-sast-review-comments: on
  # ---------------------------------------------------------------------------
  # JOB 3: Dependency review on PRs (GitHub native SCA complement)
  # ---------------------------------------------------------------------------
  dependency-review:
    name: "Dependency Review (PR only)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
