# =============================================================================
# Aikido Security — Full Scan Pipeline (SAST + SCA + Secrets)
# Target: https://github.com/appsecco/dvja
# Fixed: correct action inputs per AikidoSec/github-actions-workflow@v1.0.12
# Valid inputs: secret-key, minimum-severity, fail-on-timeout,
#               fail-on-dependency-scan, fail-on-iac-scan, fail-on-sast-scan,
#               timeout-seconds, post-scan-status-comment,
#               post-sast-review-comments, github-token
# =============================================================================

name: Aikido Security Scan

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
#  schedule:
#    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: Aikido SAST + SCA + Secrets
  # ---------------------------------------------------------------------------
  aikido-scan:
    name: "Aikido — SAST / SCA / Secrets"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # REQUIRED: full history so Aikido can resolve base_commit_id
          fetch-depth: 0

      - name: Set up Java (DVJA is a Maven project)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'

      - name: Build project (improves SCA dependency resolution)
        run: mvn clean package -DskipTests -q 2>&1 || true

      # -----------------------------------------------------------------------
      # Aikido CI Scanner — corrected inputs only
      # Docs: https://docs.aikido.dev/ci-integrations/github-actions
      # -----------------------------------------------------------------------
      - name: Run Aikido Security Scan
        uses: AikidoSec/github-actions-workflow@v1.0.12
        with:
          # --- Authentication ---
          secret-key: ${{ secrets.AIKIDO_TOKEN }}

          # --- Required: pass github-token so Aikido resolves base_commit_id ---
          github-token: ${{ secrets.GITHUB_TOKEN }}

          # --- Severity gate ---
          # Minimum severity to fail the build: CRITICAL, HIGH, MEDIUM, LOW
          minimum-severity: HIGH

          # --- Scan type gates (true = fail pipeline if this scan type finds issues) ---
          fail-on-sast-scan: true          # SAST findings gate
          fail-on-dependency-scan: true    # SCA / dependency findings gate
          fail-on-iac-scan: false          # IaC not relevant for DVJA (Java app)

          # --- Timeout ---
          timeout-seconds: 180
          fail-on-timeout: false           # Don't fail CI if scan times out

          # --- PR feedback ---
          post-scan-status-comment: on     # Posts a summary comment on PRs
          post-sast-review-comments: on    # Inline SAST comments on PR diff


  # ---------------------------------------------------------------------------
  # JOB 3: Dependency review on PRs (GitHub native SCA complement)
  # ---------------------------------------------------------------------------
  dependency-review:
    name: "Dependency Review (PR only)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
